version: "3.9"

services:
  db:
    image: postgres:15
    container_name: odoo_db
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "5432:5432"
  odoo:
    image: odoo:19
    container_name: odoo
    depends_on:
      - db
    ports:
      - "8069:8069"
    env_file:
      - .env
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons

volumes:
  odoo-db-data:
  odoo-web-data: